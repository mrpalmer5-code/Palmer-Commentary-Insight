<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmer Commentary & Insight</title>
    <style>
        /* ==========================================================================
           PREMIUM ACADEMIC DARK MODE STYLES
           ========================================================================== */
        :root {
            --bg-color: #0d0d0d;
            --bg-card: #161614;
            --bg-card-hover: #1c1c1a;
            --text-main: #e0e0d8;
            --text-muted: #8a8a82;
            --text-cream: #f0e6d2;
            --accent-gold: #d4af37;
            --accent-gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #262624;
            --border-light: #3a3a38;
            --max-width: 720px;
            --font-serif: 'Georgia', 'Times New Roman', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.7;
            font-size: 17px;
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: var(--max-width);
            margin: 40px auto 20px auto;
            padding: 0 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            font-family: var(--font-serif);
            color: var(--text-cream);
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 10px;
            border-bottom: 1px dotted transparent;
            transition: border-color 0.2s;
        }

        .nav-links a:hover {
            border-color: var(--accent-gold);
        }

        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px;
        }

        /* Home Feed View */
        .feed-container { display: block; }
        
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-gold);
        }

        .post-card h2 {
            font-family: var(--font-serif);
            color: var(--text-cream);
            margin-bottom: 8px;
            font-size: 1.5rem;
            line-height: 1.3;
        }

        .post-card .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .post-card p {
            color: var(--text-main);
            opacity: 0.85;
            font-size: 0.98rem;
        }

        /* Article View Styles */
        .article-container { display: none; }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--accent-gold);
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            margin-bottom: 24px;
            font-family: inherit;
        }

        .article-header h2 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--text-cream);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .article-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
            border-left: 2px solid var(--accent-gold);
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .article-body {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            color: var(--text-main);
            letter-spacing: 0.1px;
        }

        .article-body p {
            margin-bottom: 24px;
        }

        /* Dropcap implementation */
        .article-body p:first-of-type::first-letter {
            font-family: var(--font-serif);
            font-size: 3.8rem;
            font-weight: bold;
            float: left;
            margin-top: 8px;
            margin-right: 10px;
            line-height: 0.8;
            color: var(--accent-gold);
        }

        .inline-card {
            color: var(--accent-gold);
            border-bottom: 1px dashed var(--accent-gold);
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .inline-card:hover {
            background: var(--accent-gold-dim);
        }

        /* Drawer / Modal Citations Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-top: 1px solid var(--accent-gold);
            border-radius: 12px 12px 0 0;
            padding: 30px;
            z-index: 2001;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        @media (min-width: 768px) {
            .modal-overlay {
                align-items: center;
            }
            .drawer-card {
                border-radius: 8px;
                border: 1px solid var(--border-light);
                transform: scale(0.9);
            }
            .modal-overlay.active .drawer-card {
                transform: translateY(0) scale(1);
            }
        }

        .modal-overlay.active .drawer-card {
            transform: translateY(0);
        }

        .drawer-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-close:hover {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
        }

        .drawer-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-date {
            font-size: 0.75rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .drawer-title {
            font-family: var(--font-serif);
            color: var(--text-cream);
            font-size: 1.8rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .drawer-abstract {
            font-size: 1rem;
            color: var(--text-main);
            opacity: 0.9;
            margin-bottom: 25px;
            border-left: 2px solid var(--border-light);
            padding-left: 15px;
        }

        .drawer-btn {
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .drawer-btn:hover {
            background: var(--accent-gold);
            color: #000;
        }

        /* Comments & Ratings */
        #comments-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .section-header {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: var(--text-cream);
            margin-bottom: 30px;
        }

        .rating-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .rating-widget p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stars { display: flex; gap: 10px; }
        .star {
            font-size: 2rem;
            color: var(--border-light);
            cursor: pointer;
            transition: color 0.2s;
        }
        .star.active { color: var(--accent-gold); }

        .comment-form { margin-bottom: 40px; }

        .comment-form textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px;
            border-radius: 4px;
            font-family: var(--font-sans);
            font-size: 1rem;
            min-height: 100px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .comment-form textarea:focus { border-color: var(--accent-gold); outline: none; }

        .btn-submit {
            background: var(--accent-gold);
            color: #000;
            border: none;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: var(--text-cream); }

        .comment-thread { list-style: none; }

        .comment {
            border-left: 2px solid var(--border-color);
            padding-left: 20px;
            margin-bottom: 25px;
        }

        .comment.reply {
            margin-left: 20px;
            margin-top: 20px;
            border-left-color: var(--border-light);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .comment-author { font-weight: bold; color: var(--text-cream); font-size: 0.95rem; }
        .comment-date { color: var(--text-muted); font-size: 0.8rem; }
        .comment-body { color: var(--text-main); font-size: 0.95rem; margin-bottom: 8px; }

        .btn-reply {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }
        .btn-reply:hover { color: var(--accent-gold); }

        .reply-form { margin-top: 15px; display: none; }
        .reply-form.active { display: block; }

        .reply-form textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            min-height: 60px;
            margin-bottom: 5px;
        }

        /* Admin Section View */
        .admin-container { display: none; }
        
        .admin-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 8px;
        }

        .admin-box h2 {
            font-family: var(--font-serif);
            margin-bottom: 20px;
            color: var(--text-cream);
            font-size: 1.8rem;
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 16px; /* Prevents iOS zoom */
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-gold);
            border: 1px dashed var(--accent-gold);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .wiki-builder-row {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .wiki-builder-row input, .wiki-builder-row textarea {
            margin-bottom: 8px;
            background: var(--bg-card);
        }
        
        .wiki-builder-row input:last-child, .wiki-builder-row textarea:last-child {
            margin-bottom: 0;
        }

        .remove-card-btn {
            color: #ff4d4d;
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="showHome()">Palmer House Insight</h1>
        <p>Academic Theoretical Research Commentaries</p>
        <div class="nav-links">
            <a href="#" onclick="showHome(); return false;">Home Feed</a>
            <a href="#admin" onclick="showAdmin(); return false;">Write Post</a>
        </div>
    </header>

    <main>
        <!-- Home Feed Page -->
        <div id="feed-view" class="feed-container"></div>

        <!-- Single Article Reading Page -->
        <div id="article-view" class="article-container">
            <button class="back-btn" onclick="showHome()">← Back to Feed</button>
            <div id="article-content-target"></div>
        </div>

        <!-- Secret Automated Content Publisher Admin Page -->
        <div id="admin-view" class="admin-container">
            <div class="admin-box">
                <h2>Publish Content Engine</h2>
                <div class="form-group">
                    <label>GitHub Fine-Grained Token</label>
                    <input type="password" id="gh-token" placeholder="github_pat_...">
                </div>
                <hr style="border-color: var(--border-color); margin: 20px 0;">
                <div class="form-group">
                    <label>Article Title</label>
                    <input type="text" id="post-title" placeholder="e.g., The Alchemy of Consciousness">
                </div>
                <div class="form-group">
                    <label>Brief Summary Feed Abstract</label>
                    <textarea id="post-summary" rows="2" placeholder="Short description seen on the home timeline list..."></textarea>
                </div>
                <div class="form-group">
                    <label>Article Paragraph Text (HTML format)</label>
                    <textarea id="post-content" rows="10" placeholder="Type paragraphs wrapped in <p>...</p> tags. Wrap keywords in <span class='inline-card' data-card='card-id'>Keyword</span> to connect popup wiki citation cards."></textarea>
                </div>

                <div style="margin: 20px 0;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 10px;">Optional: Add Pop-up Wiki Citation Drawer(s)</label>
                    <div id="wiki-cards-builder"></div>
                    <button class="btn-secondary" onclick="addWikiCardRow()">+ Add Wiki Citation Card</button>
                </div>

                <button class="btn-submit" onclick="publishToGitHub()">Publish Post Live</button>
            </div>
        </div>
    </main>

    <!-- Overlay Architecture Elements -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeDrawer()">
        <div class="drawer-card" onclick="event.stopPropagation()">
            <button class="drawer-close" onclick="closeDrawer()">✕</button>
            <img src="" id="d-img" class="drawer-img">
            <span class="drawer-date" id="d-date"></span>
            <h3 id="d-title" class="drawer-title"></h3>
            <p id="d-abstract" class="drawer-abstract"></p>
            <a href="" id="d-link" target="_blank" class="drawer-btn">Read Deep-Dive Documentation</a>
        </div>
    </div>

    <!-- ==========================================================================
       AUTOMATED SYSTEM RUNTIME DATABASE & MOTOR FRAMEWORK
       (The code engine edits the text inside these markers to save your posts)
       ========================================================================== -->
    <!-- BLOG_DATA_START -->
    <script>
    window.blogPosts = [
      {
        "id": "post-1",
        "title": "Why We Are Here",
        "date": "June 29, 2026",
        "summary": "At the intersection of science and spirituality, we build evidence-based hypotheses exploring common ground and humanity's greater potential.",
        "content": "<p>Humanity has always sought to understand its place in the cosmos. This platform explores the common ground between science and spirituality, building evidence-based hypotheses that use rigorous inquiry to expand humanity’s potential beyond current limits.</p>",
        "cards": [
          {
            "id": "anthony",
            "title": "Saint Anthony",
            "date": "251–356 AD",
            "img": "https://images.unsplash.com/photo-1548013146-72479768bada?q=80&w=600",
            "link": "https://en.wikipedia.org/wiki/Anthony_the_Great",
            "abstract": "Anthony the Great was a Christian monk from Egypt, revered since his death as a saint. He is distinguished as the father of all desert monastic archetypes."
          }
        ]
      }
    ];
    </script>
    <!-- BLOG_DATA_END -->

    <script>
        // Router Management Logic
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', () => {
            if(localStorage.getItem('gh_pat')) {
                document.getElementById('gh-token').value = localStorage.getItem('gh_pat');
            }
            handleRoute();
        });

        function handleRoute() {
            const hash = window.location.hash;
            if (hash === '#admin') {
                showAdmin();
            } else if (hash.startsWith('#post-')) {
                const postId = hash.replace('#', '');
                openArticle(postId);
            } else {
                showHome();
            }
        }

        function showHome() {
            window.location.hash = '';
            document.getElementById('feed-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'none';
            renderFeed();
        }

        function showAdmin() {
            window.location.hash = 'admin';
            document.getElementById('feed-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
        }

        function renderFeed() {
            const feed = document.getElementById('feed-view');
            feed.innerHTML = '';
            if (window.blogPosts.length === 0) {
                feed.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No posts yet. Go to #admin to publish.</p>';
                return;
            }
            window.blogPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.onclick = () => window.location.hash = post.id;
                card.innerHTML = `
                    <h2>${post.title}</h2>
                    <div class="meta">${post.date}</div>
                    <p>${post.summary}</p>
                `;
                feed.appendChild(card);
            });
        }

        let currentActiveCards = [];
        function openArticle(id) {
            const post = window.blogPosts.find(p => p.id === id);
            if(!post) return showHome();
            
            document.getElementById('feed-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            currentActiveCards = post.cards || [];
            
            const target = document.getElementById('article-content-target');
            target.innerHTML = `
                <div class="article-header">
                    <h2>${post.title}</h2>
                    <div class="article-meta">Published on ${post.date}</div>
                </div>
                <div class="article-body">
                    ${post.content}
                </div>
                
                <section id="comments-section">
                    <h3 class="section-header">Review & Community Discussion</h3>
                    <div class="rating-widget">
                        <p>Rate this research piece</p>
                        <div class="stars">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                    </div>

                    <div class="comment-form">
                        <textarea placeholder="Share your thoughts or insights on this thread..."></textarea>
                        <button class="btn-submit" onclick="postComment(this)">Post Comment</button>
                    </div>

                    <ul class="comment-thread" id="commentThread">
                        <li class="comment">
                            <div class="comment-header">
                                <span class="comment-author">Dr. Aris Thorne</span>
                                <span class="comment-date">2 days ago</span>
                            </div>
                            <div class="comment-body">Fascinating breakdown of the Consensus AI limits. It reminds me that much of human knowledge is still analog and deeply personal.</div>
                            <button class="btn-reply" onclick="toggleReply(this)">Reply</button>
                            <div class="reply-form">
                                <textarea placeholder="Write a reply..."></textarea>
                                <button class="btn-submit" style="font-size: 0.75rem; padding: 8px 15px; width: auto;" onclick="postReply(this)">Submit Reply</button>
                            </div>
                        </li>
                    </ul>

                    <!-- GISCUS / DISQUS PLACEHOLDER -->
                    <div id="giscus-container" style="margin-top: 40px; padding-top: 20px; border-top: 1px dashed var(--border-color);">
                        <!-- Paste Giscus code here later if desired -->
                    </div>
                </section>
            `;

            // Attach listeners to inline wiki cards
            document.querySelectorAll('.inline-card').forEach(el => {
                el.addEventListener('click', (e) => {
                    const cardId = e.target.getAttribute('data-card');
                    openDrawer(cardId);
                });
            });

            // Attach Star Listeners
            const stars = document.querySelectorAll('#comments-section .star');
            stars.forEach((star, index) => {
                star.addEventListener('click', () => {
                    stars.forEach((s, i) => {
                        if (i <= index) s.classList.add('active');
                        else s.classList.remove('active');
                    });
                });
            });
        }

        // Citation Drawer Engine Functions
        function openDrawer(cardId) {
            const cardData = currentActiveCards.find(c => c.id === cardId);
            if(!cardData) return;

            document.getElementById('d-title').innerText = cardData.title;
            document.getElementById('d-date').innerText = cardData.date;
            document.getElementById('d-abstract').innerText = cardData.abstract;
            
            const img = document.getElementById('d-img');
            if(cardData.img) {
                img.src = cardData.img;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
            
            const link = document.getElementById('d-link');
            if(cardData.link) {
                link.href = cardData.link;
                link.style.display = 'block';
            } else {
                link.style.display = 'none';
            }

            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Comment Mock Logic
        function toggleReply(button) {
            const form = button.nextElementSibling;
            form.classList.toggle('active');
        }

        function postComment(button) {
            const textarea = button.previousElementSibling;
            const text = textarea.value.trim();
            if (text) {
                const thread = document.getElementById('commentThread');
                const newComment = document.createElement('li');
                newComment.className = 'comment';
                newComment.innerHTML = `
                    <div class="comment-header">
                        <span class="comment-author">You (Guest)</span>
                        <span class="comment-date">Just now</span>
                    </div>
                    <div class="comment-body">${text}</div>
                    <button class="btn-reply" onclick="toggleReply(this)">Reply</button>
                    <div class="reply-form">
                        <textarea placeholder="Write a reply..."></textarea>
                        <button class="btn-submit" style="font-size: 0.75rem; padding: 8px 15px; width: auto;" onclick="postReply(this)">Submit Reply</button>
                    </div>
                `;
                thread.prepend(newComment);
                textarea.value = '';
            }
        }

        function postReply(button) {
            const form = button.parentElement;
            const textarea = form.querySelector('textarea');
            const text = textarea.value.trim();
            if (text) {
                const parentComment = form.parentElement;
                let replyThread = parentComment.querySelector('.comment-thread');
                
                if (!replyThread) {
                    replyThread = document.createElement('ul');
                    replyThread.className = 'comment-thread';
                    replyThread.style.marginTop = '20px';
                    parentComment.appendChild(replyThread);
                }

                const newReply = document.createElement('li');
                newReply.className = 'comment reply';
                newReply.innerHTML = `
                    <div class="comment-header">
                        <span class="comment-author">You (Guest)</span>
                        <span class="comment-date">Just now</span>
                    </div>
                    <div class="comment-body">${text}</div>
                    <button class="btn-reply" onclick="toggleReply(this)">Reply</button>
                    <div class="reply-form">
                        <textarea placeholder="Write a reply..."></textarea>
                        <button class="btn-submit" style="font-size: 0.75rem; padding: 8px 15px; width: auto;" onclick="postReply(this)">Submit Reply</button>
                    </div>
                `;
                replyThread.appendChild(newReply);
                textarea.value = '';
                form.classList.remove('active');
            }
        }

        // Admin Dynamic Wiki Card Builder
        function addWikiCardRow() {
            const builder = document.getElementById('wiki-cards-builder');
            const row = document.createElement('div');
            row.className = 'wiki-builder-row';
            row.innerHTML = `
                <input type="text" placeholder="Card ID (e.g., anthony)" class="w-id">
                <input type="text" placeholder="Card Title (e.g., Saint Anthony)" class="w-title">
                <input type="text" placeholder="Timeline Date Frame (e.g., 251–356 AD)" class="w-date">
                <input type="text" placeholder="Header Image URL" class="w-img">
                <input type="text" placeholder="External Wikipedia Documentation Link" class="w-link">
                <textarea placeholder="Pop-up summary text profile descriptor goes right here..." class="w-abstract" rows="2"></textarea>
                <button class="remove-card-btn" onclick="this.parentElement.remove()">Remove Card</button>
            `;
            builder.appendChild(row);
        }

        // BACKEND MACHINE: Automator GitHub API Publisher Committer 
        async function publishToGitHub() {
            const token = document.getElementById('gh-token').value.trim();
            const title = document.getElementById('post-title').value.trim();
            const summary = document.getElementById('post-summary').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if(!token || !title || !summary || !content) {
                alert('Please enter your access token and fill out all post input parameters fields.');
                return;
            }

            localStorage.setItem('gh_pat', token);

            // Construct Card array data if provided
            const cards = [];
            document.querySelectorAll('.wiki-builder-row').forEach(row => {
                const cid = row.querySelector('.w-id').value.trim();
                if(cid) {
                    cards.push({
                        id: cid,
                        title: row.querySelector('.w-title').value.trim(),
                        date: row.querySelector('.w-date').value.trim(),
                        img: row.querySelector('.w-img').value.trim(),
                        link: row.querySelector('.w-link').value.trim(),
                        abstract: row.querySelector('.w-abstract').value.trim()
                    });
                }
            });

            const newPost = {
                id: 'post-' + Date.now(),
                title: title,
                date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                summary: summary,
                content: content,
                cards: cards
            };

            const updatedPostsArray = [newPost, ...window.blogPosts];
            const arrayString = `window.blogPosts = ${JSON.stringify(updatedPostsArray, null, 2)};`;

            // Configuration Constants
            const owner = "mrpalmer5-code";
            const repo = "Palmer-Commentary-Insight";
            const path = "index.html";
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                // 1. Fetch current file SHA
                const fileRes = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });
                if(!fileRes.ok) throw new Error("Could not retrieve file configuration tracking from GitHub.");
                const fileData = await fileRes.json();
                const sha = fileData.sha;
                
                // Decode old HTML content
                const oldHtml = decodeURIComponent(escape(atob(fileData.content)));
                
                // 2. Perform safe swap across markers
                const startMarker = "<!-- BLOG_DATA_START -->";
                const endMarker = "<!-- BLOG_DATA_END -->";
                
                const beforeIdx = oldHtml.indexOf(startMarker);
                const afterIdx = oldHtml.indexOf(endMarker);
                
                if(beforeIdx === -1 || afterIdx === -1) throw new Error("Code storage markers missing inside file configuration blueprint.");
                
                const newHtml = oldHtml.substring(0, beforeIdx + startMarker.length) + 
                                `\n    <script>\n    ${arrayString}\n    <\/script>\n    ` + 
                                oldHtml.substring(afterIdx);

                // 3. Put request payload tracking back to origin repo
                const putBody = {
                    message: `Publish automated commentary entry: ${title}`,
                    content: btoa(unescape(encodeURIComponent(newHtml))),
                    sha: sha
                };

                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(putBody)
                });

                if(putRes.ok) {
                    alert("Success! Entry successfully pushed to repo. Allow Vercel roughly 20 seconds to compile updates before visiting homepage.");
                    window.location.hash = '';
                    window.location.reload();
                } else {
                    const errData = await putRes.json();
                    alert("Publish failed: " + errData.message);
                }
            } catch(e) {
                alert("Runtime operation error: " + e.message);
            }
        }
    </script>
